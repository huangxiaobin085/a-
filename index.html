
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股超短情绪周期综合打分系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    color: #f6e05e;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: #718096;
    margin-bottom: 28px;
  }

  /* ── 温度计区 ── */
  .thermo-section {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .thermo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 80px;
  }
  .thermo-label {
    font-size: 12px;
    color: #a0aec0;
    text-align: center;
    line-height: 1.4;
  }
  .thermo-svg-wrap {
    position: relative;
  }
  .thermo-date {
    font-size: 11px;
    color: #718096;
    text-align: center;
  }

  /* 温度计右侧信息 */
  .thermo-info {
    flex: 1;
    min-width: 260px;
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 10px;
    padding: 18px 20px;
  }
  .thermo-info h2 {
    font-size: 15px;
    color: #f6e05e;
    margin-bottom: 14px;
  }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .score-box {
    background: #0f1117;
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }
  .score-box .s-label {
    font-size: 11px;
    color: #718096;
    margin-bottom: 4px;
  }
  .score-box .s-val {
    font-size: 18px;
    font-weight: bold;
  }
  .score-box .s-sub {
    font-size: 11px;
    color: #a0aec0;
    margin-top: 2px;
  }
  .breakdown-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .bd-item {
    font-size: 12px;
    background: #2d3748;
    padding: 3px 10px;
    border-radius: 16px;
    color: #e2e8f0;
  }
  .bd-item span {
    color: #f6e05e;
    font-weight: bold;
  }
  .event-tag {
    background: #744210;
    color: #fbd38d;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }

  /* ── 图表 ── */
  .chart-full {
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .chart-full h3 {
    font-size: 14px;
    color: #90cdf4;
    margin-bottom: 12px;
    text-align: center;
  }
  .chart-full-wrap {
    position: relative;
    height: 300px;
  }

  /* ── 明细表格 ── */
  .table-card {
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 10px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 24px;
  }
  .table-card h3 {
    font-size: 14px;
    color: #90cdf4;
    margin-bottom: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 580px;
  }
  th {
    background: #2d3748;
    color: #f6e05e;
    padding: 8px 6px;
    text-align: center;
    border-bottom: 2px solid #4a5568;
    white-space: nowrap;
  }
  td {
    padding: 7px 6px;
    text-align: center;
    border-bottom: 1px solid #2d3748;
    white-space: nowrap;
  }
  tr:hover td {
    background: #2d3748;
  }
  .score-bar {
    display: inline-block;
    height: 7px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .strength-strong { color: #fc8181; font-weight: bold; }
  .strength-weak   { color: #68d391; font-weight: bold; }
  .strength-neutral { color: #a0aec0; }
  .trend-up   { color: #fc8181; }
  .trend-down { color: #68d391; }
  .trend-flat { color: #a0aec0; }
  .emotion-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
  }

  /* ── 赚亏标签 ── */
  .pl-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    white-space: nowrap;
  }
  .pl-high    { background: #742a2a; color: #fc8181; }
  .pl-strong  { background: #7b341e; color: #f6ad55; }
  .pl-warm    { background: #744210; color: #fbd38d; }
  .pl-cont    { background: #2d3748; color: #a0aec0; }
  .pl-reverse { background: #234e52; color: #81e6d9; }
  .pl-freeze  { background: #1a365d; color: #63b3ed; }

  /* ── 力度标签 ── */
  .force-strong { color: #fc8181; font-weight: bold; }
  .force-mid    { color: #f6ad55; font-weight: bold; }
  .force-weak   { color: #fbd38d; }
  .force-flat   { color: #a0aec0; }
  .force-down-w { color: #68d391; }
  .force-down-m { color: #48bb78; font-weight: bold; }
  .force-down-s { color: #2f855a; font-weight: bold; }

</style>
</head>

<div class="subtitle">
   
</div>

<!-- 温度计 + 最新日信息 -->
<div class="thermo-section" id="thermoSection"></div>

</div>

function emotionBg(e) {
  if (e.includes('高潮')) return '#742a2a';
  if (e.includes('发酵')) return '#744210';
  if (e.includes('中性')) return '#2d3748';
  if (e.includes('分歧')) return '#1c4532';
  return '#1a365d';
}

// 温度计 SVG 生成函数
// score: 当前分（可超100），min/max 为刻度范围
function buildThermometer(score, label, dateStr) {
  const W = 64, H = 220;
  const tubeX = W / 2, tubeTop = 14, tubeBot = 170;
  const tubeH = tubeBot - tubeTop;
  const bulbR = 14, bulbCY = tubeBot + bulbR + 2;
  const tubeInner = 7;

  // 颜色
  const pct = Math.max(0, Math.min(1, score / 100));
  function scoreColor(s) {
    if (s >= 75) return '#fc8181';
    if (s >= 60) return '#f6ad55';
    if (s >= 50) return '#f6e05e';
    if (s >= 35) return '#68d391';
    return '#63b3ed';
  }
  const col = scoreColor(score);

  // 液柱高度（最低在球底，最高到管顶）
  const fillH = Math.max(4, Math.min(tubeH, pct * tubeH));
  const fillY  = tubeBot - fillH;

  // 刻度线 0,25,50,75,100
  const ticks = [0, 25, 50, 75, 100].map(v => {
    const ty = tubeBot - (v / 100) * tubeH;
    return `<line x1="${tubeX - 10}" y1="${ty}" x2="${tubeX + 10}" y2="${ty}" stroke="#4a5568" stroke-width="1"/>
            <text x="${tubeX + 13}" y="${ty + 4}" font-size="8" fill="#718096" font-family="sans-serif">${v}</text>`;
  }).join('');

  // 分数标注
  const scoreY = Math.max(tubeTop + 10, fillY - 4);

  return `<svg width="${W + 30}" height="${bulbCY + bulbR + 10}" viewBox="0 0 ${W + 30} ${bulbCY + bulbR + 10}">
    <!-- 管外框 -->
    <rect x="${tubeX - tubeInner - 2}" y="${tubeTop - 2}" width="${(tubeInner + 2) * 2}"
          height="${tubeH + 4}" rx="8" ry="8" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
    <!-- 液柱 -->
    <rect x="${tubeX - tubeInner}" y="${fillY}" width="${tubeInner * 2}"
          height="${fillH}" rx="6" ry="6" fill="${col}" opacity="0.9"/>
    <!-- 球 -->
    <circle cx="${tubeX}" cy="${bulbCY}" r="${bulbR}" fill="${col}" opacity="0.95"/>
    <circle cx="${tubeX}" cy="${bulbCY}" r="${bulbR - 4}" fill="${col}" opacity="0.5"/>
    <!-- 刻度 -->
    ${ticks}
    <!-- 分数 -->
    <text x="${tubeX}" y="${scoreY}" text-anchor="middle" font-size="9" font-weight="bold"
          fill="${col}" font-family="sans-serif">${score}</text>
    <!-- 球内分数 -->
    <text x="${tubeX}" y="${bulbCY + 4}" text-anchor="middle" font-size="10" font-weight="bold"
          fill="white" font-family="sans-serif">${score}</text>
  </svg>`;
}

DATA.forEach(r => {
  // 盘中趋势颜色
  const intraClass = r['盘中趋势'].includes('回暖') ? 'trend-up' : (r['盘中趋势'].includes('转弱') ? 'trend-down' : 'trend-flat');
  // 总分颜色
  const totalColor = r['总分'] >= 75 ? '#fc8181' : r['总分'] >= 60 ? '#f6ad55' : r['总分'] >= 50 ? '#e2e8f0' : r['总分'] >= 35 ? '#68d391' : '#63b3ed';
  // 分数条
  const barW = Math.max(4, Math.min(80, Math.round(r['总分'] * 0.55)));

  tbody.innerHTML += `
    <tr>
      <td style="color:#90cdf4;font-weight:bold;font-size:13px">${r['日期']}</td>
      <td class="${intraClass}" style="font-size:13px">${r['盘中趋势']}</td>
      <td class="${r['力度样式']}" style="font-size:13px">${r['两天力度']}</td>
      <td>
        <span class="emotion-tag" style="background:${emotionBg(r['情绪'])};color:${r['情绪色']}">
          ${r['情绪']}
        </span>
      </td>
      <td>
        <span class="pl-tag ${r['赚亏样式']}">${r['赚亏']}</span>
      </td>
      <td style="color:${totalColor};font-weight:bold;font-size:14px">
        ${r['总分']}
        <span class="score-bar" style="width:${barW}px;background:${totalColor}"></span>
      </td>
    </tr>
  `;
});

// ────────────────────────────────
// Chart.js
// ────────────────────────────────
Chart.defaults.color = '#718096';
Chart.defaults.borderColor = '#2d3748';
const labels = DATA.map(r => r['日期']);

// 1. 总分走势
const scoreCtx = document.getElementById('scoreChart').getContext('2d');
new Chart(scoreCtx, {
  type: 'line',
  data: {
    labels,
    datasets: [{
      label: '综合总分',
      data: DATA.map(r => r['总分']),
      borderColor: '#f6e05e',
      backgroundColor: ctx => {
        const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 300);
        g.addColorStop(0, 'rgba(246,224,94,0.25)');
        g.addColorStop(1, 'rgba(246,224,94,0)');
        return g;
      },
      fill: true,
      tension: 0.35,
      pointRadius: 3.5,
      pointHoverRadius: 6,
      pointBackgroundColor: DATA.map(r =>
        r['总分']>=75 ? '#fc8181' :
        r['总分']>=60 ? '#f6ad55' :
        r['总分']>=50 ? '#f6e05e' :
        r['总分']>=35 ? '#68d391' : '#63b3ed'
      ),
      borderWidth: 2,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: ctx => DATA[ctx[0].dataIndex]['日期全'],
          afterLabel: ctx => {
            const r = DATA[ctx.dataIndex];
            const lines = [
              `情绪：${r['情绪']}`,
              `竞价：${r['竞价原始']} ${r['竞价强弱']} ${r['竞价趋势']}`,
              `收盘：${r['收盘原始']} ${r['收盘强弱']} ${r['收盘趋势']}`,
              `事件分：${r['分_事件']}${r['事件']?' | '+r['事件']:''}`,
            ];
            if (r['分_额外'] > 0) {
              lines.push(`额外分：+${r['分_额外']} ${r['复盘']||''}`);
            }
            return lines;
          }
        }
      }
    },
    scales: {
      y: {
        min: 0,
        grid: { color: '#2d3748' },
        ticks: { color: '#718096' },
      },
      x: { grid: { display: false }, ticks: { maxRotation: 45, color: '#718096', font: { size: 10 } } }
    }
  }
});

// 2. 情绪温度历史折线（总分 + 各分项）
const tempCtx = document.getElementById('tempLineChart').getContext('2d');
new Chart(tempCtx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: '总分',
        data: DATA.map(r => r['总分']),
        borderColor: '#f6e05e',
        borderWidth: 2.5,
        tension: 0.3,
        pointRadius: 2,
        fill: false,
        yAxisID: 'y',
      },
      {
        label: '收盘(×2→满60等价)',
        data: DATA.map(r => r['分_收盘']),
        borderColor: '#fc8181',
        borderWidth: 1.5,
        tension: 0.3,
        pointRadius: 0,
        fill: false,
        borderDash: [4,2],
        yAxisID: 'y',
      },
      {
        label: '竞价',
        data: DATA.map(r => r['分_竞价']),
        borderColor: '#f6ad55',
        borderWidth: 1.5,
        tension: 0.3,
        pointRadius: 0,
        fill: false,
        borderDash: [4,2],
        yAxisID: 'y',
      },
      {
        label: '连板',
        data: DATA.map(r => r['分_连板']),
        borderColor: '#68d391',
        borderWidth: 1.5,
        tension: 0.3,
        pointRadius: 0,
        fill: false,
        borderDash: [4,2],
        yAxisID: 'y',
      },
      {
        label: '事件（无上限）',
        data: DATA.map(r => r['分_事件']),
        borderColor: '#63b3ed',
        borderWidth: 1.5,
        tension: 0.3,
        pointRadius: 2,
        fill: false,
        yAxisID: 'y2',
      },
      {
        label: '额外分（直接加成）',
        data: DATA.map(r => r['分_额外']),
        borderColor: '#d6bcfa',
        backgroundColor: 'rgba(214,188,250,0.15)',
        borderWidth: 2,
        tension: 0,
        pointRadius: 3,
        pointStyle: 'triangle',
        fill: true,
        yAxisID: 'y2',
      },
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } },
      tooltip: {
        callbacks: {
          title: ctx => DATA[ctx[0].dataIndex]['日期全'],
        }
      }
    },
    scales: {
      y: {
        position: 'left',
        min: 0,
        title: { display: true, text: '总分 / 分项', color: '#718096', font: { size: 10 } },
        grid: { color: '#2d3748' },
        ticks: { color: '#718096' },
      },
      y2: {
        position: 'right',
        title: { display: true, text: '事件分 / 额外分', color: '#63b3ed', font: { size: 10 } },
        grid: { drawOnChartArea: false },
        ticks: { color: '#63b3ed' },
      },
      x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 10 } } }
    }
  }
});
</script>
</body>
</html>
